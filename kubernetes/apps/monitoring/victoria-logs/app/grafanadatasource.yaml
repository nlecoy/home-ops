---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-logs-datasource
spec:
  # renovate: datasource=github-releases depName=VictoriaMetrics/victoriametrics-datasource
  datasource:
    access: proxy
    type: victoriametrics-logs-datasource
    name: victoria-logs
    url: http://victoria-logs.monitoring.svc.cluster.local:9428
  instanceSelector:
    matchLabels:
      dashboards: grafana
  plugins:
    - name: victoriametrics-logs-datasource
      version: "0.28.0"
